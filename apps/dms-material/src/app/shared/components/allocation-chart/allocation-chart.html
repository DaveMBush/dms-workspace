<div class="w-full max-w-md">
  <h2 class="text-lg font-semibold mb-2 chart-title">
    Allocation by Risk Group
  </h2>
  @if (!hasAllocationData$()) {
  <div class="no-data-message" data-testid="no-data-message">
    No data available
  </div>
  } @else {
  <dms-summary-display
    data-testid="allocation-chart"
    [data$]="allocationData$()"
    [chartType$]="'pie'"
    [options$]="pieChartOptions$()"
  ></dms-summary-display>
  }
</div>
