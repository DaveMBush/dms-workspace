<div class="flex items-center">
  <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="flex-1">
    <a
      mat-tab-link
      routerLink="./"
      routerLinkActive
      #rla1="routerLinkActive"
      [routerLinkActiveOptions]="{ exact: true }"
      [active]="rla1.isActive"
      (click)="onTabChange('')"
      data-testid="account-tab-summary"
    >
      Summary
    </a>
    <a
      mat-tab-link
      routerLink="open"
      routerLinkActive
      #rla2="routerLinkActive"
      [active]="rla2.isActive"
      (click)="onTabChange('open')"
      data-testid="account-tab-open"
    >
      Open Positions
    </a>
    <a
      mat-tab-link
      routerLink="sold"
      routerLinkActive
      #rla3="routerLinkActive"
      [active]="rla3.isActive"
      (click)="onTabChange('sold')"
      data-testid="account-tab-sold"
    >
      Sold Positions
    </a>
    <a
      mat-tab-link
      routerLink="div-dep"
      routerLinkActive
      #rla4="routerLinkActive"
      [active]="rla4.isActive"
      (click)="onTabChange('div-dep')"
      data-testid="account-tab-div-dep"
    >
      Dividend Deposits
    </a>
  </nav>
  @if (showAddButton$()) {
  <button
    data-testid="add-new-position-button"
    mat-icon-button
    [matTooltip]="buttonTooltip$()"
    (click)="onAddClick()"
  >
    <mat-icon>add</mat-icon>
  </button>
  }
</div>
<mat-tab-nav-panel #tabPanel>
  <router-outlet></router-outlet>
</mat-tab-nav-panel>
