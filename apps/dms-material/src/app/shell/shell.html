<a class="skip-link" href="#main-content">Skip to main content</a>
<nav class="shrink-0" aria-label="Main navigation">
  <mat-toolbar color="primary" class="shell-toolbar">
    <span class="app-title">Dividend Management System Material</span>

    <span class="flex-auto"></span>

    <button
      mat-icon-button
      (click)="themeService.toggleTheme()"
      aria-label="Toggle theme"
    >
      <mat-icon>{{ darkModeIcon$() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      aria-label="User menu"
    >
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <a mat-menu-item routerLink="/profile">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </a>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>
</nav>

<!-- eslint-disable @angular-eslint/template/no-call-expression -->
<main
  id="main-content"
  role="main"
  class="flex-1 overflow-hidden flex flex-col"
>
  <dms-splitter
    class="flex-1 overflow-hidden"
    stateKey="dms-main-splitter"
    [initialLeftWidth]="20"
  >
    <div leftPanel class="accounts-panel">
      <router-outlet name="accounts"></router-outlet>
    </div>
    <div rightPanel class="content-panel">
      <router-outlet></router-outlet>
    </div>
  </dms-splitter>
</main>

<!-- Global Loading Overlay -->
@if (isLoading()) {
<div
  data-testid="loading-overlay"
  class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40"
>
  <div class="flex flex-col items-center justify-center p-6">
    <mat-progress-spinner
      diameter="48"
      mode="indeterminate"
      aria-label="Loading"
    ></mat-progress-spinner>
    <div class="mt-3 text-white text-sm font-medium text-center">
      {{ loadingMessage() }}
    </div>
  </div>
</div>
}

<div aria-live="polite" class="sr-only" id="notification-region"></div>
