appId: com.davembush.dms
productName: DMS
electronVersion: "41.2.1"
artifactName: "${productName}-${version}-${arch}.${ext}"

directories:
  output: ../../dist/electron-dist

files:
  - 'dist/**/*'
  - 'package.json'

# All runtime files go to resources/ so they are accessible via
# process.resourcesPath in both the main process and forked server
extraResources:
  - from: '../../dist/apps/server'
    to: apps/server
    filter: '**/*'
  - from: '../../dist/apps/dms-material/browser'
    to: apps/dms-material/browser
    filter: '**/*'
  - from: '../../prisma/migrations'
    to: prisma/migrations
  - from: '../../prisma/schema.prisma'
    to: prisma/schema.prisma

linux:
  target:
    - AppImage
    - deb
  maintainer: "DaveMBush <dave@davembush.com>"

mac:
  target: dmg

win:
  target: nsis
